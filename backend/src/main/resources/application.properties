spring.application.name=calorie-tracker
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/calorie_tracking_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=${APP_PERF_DB_SLOW_MS:120}
spring.sql.init.mode=never
logging.level.org.hibernate.SQL_SLOW=INFO

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:12}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:3}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:3000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.keepalive-time=${DB_POOL_KEEPALIVE_MS:300000}
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
spring.datasource.hikari.data-source-properties.cacheResultSetMetadata=true
spring.datasource.hikari.data-source-properties.cacheServerConfiguration=true
spring.datasource.hikari.data-source-properties.elideSetAutoCommits=true
spring.datasource.hikari.data-source-properties.maintainTimeStats=false
spring.datasource.hikari.data-source-properties.useLocalSessionState=true

app.perf.api.info-ms=${APP_PERF_API_INFO_MS:220}
app.perf.api.warn-ms=${APP_PERF_API_WARN_MS:700}
app.perf.repository.info-ms=${APP_PERF_REPOSITORY_INFO_MS:90}
app.perf.repository.warn-ms=${APP_PERF_REPOSITORY_WARN_MS:260}
app.runtime.db-mode=${APP_RUNTIME_DB_MODE:mysql}
app.auth.dev-code-visible=${APP_AUTH_DEV_CODE_VISIBLE:true}
app.auth.code-expiry-minutes=${APP_AUTH_CODE_EXPIRY_MINUTES:10}
app.auth.session-hours=${APP_AUTH_SESSION_HOURS:168}
app.seed.backfill-on-startup=${APP_SEED_BACKFILL_ON_STARTUP:false}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://172.*.*.*:3000}

app.automation.enabled=${APP_AUTOMATION_ENABLED:true}
app.automation.initial-delay-ms=${APP_AUTOMATION_INITIAL_DELAY_MS:90000}
app.automation.poll-ms=${APP_AUTOMATION_POLL_MS:300000}
app.automation.internet.timeout-ms=${APP_AUTOMATION_INTERNET_TIMEOUT_MS:3500}
app.automation.internet.probes=${APP_AUTOMATION_INTERNET_PROBES:https://world.openfoodfacts.org,https://www.themealdb.com/api/json/v1/1/list.php?c=list,https://commons.wikimedia.org/wiki/Main_Page}
app.automation.default.cuisines=${APP_AUTOMATION_DEFAULT_CUISINES:indian,chinese,indo chinese,european,mediterranean,african,western,eastern,northern,southern}
app.automation.default.countries=${APP_AUTOMATION_DEFAULT_COUNTRIES:india,china,japan,thailand,vietnam,indonesia,philippines,saudi-arabia,turkey,egypt,morocco,nigeria,south-africa,united-states,canada,mexico,brazil,argentina,chile,peru,italy,spain,france,germany,united-kingdom,portugal,poland,russia,ukraine,greece,australia}
app.automation.task.correction-hours=${APP_AUTOMATION_TASK_CORRECTION_HOURS:4}
app.automation.task.open-food-facts-hours=${APP_AUTOMATION_TASK_OPEN_FOOD_FACTS_HOURS:6}
app.automation.task.world-cuisines-hours=${APP_AUTOMATION_TASK_WORLD_CUISINES_HOURS:8}
app.automation.task.sweets-hours=${APP_AUTOMATION_TASK_SWEETS_HOURS:12}
app.automation.task.images-hours=${APP_AUTOMATION_TASK_IMAGES_HOURS:24}
app.automation.open-food-facts.pages=${APP_AUTOMATION_OPEN_FOOD_FACTS_PAGES:2}
app.automation.open-food-facts.page-size=${APP_AUTOMATION_OPEN_FOOD_FACTS_PAGE_SIZE:220}
app.automation.world.max-per-cuisine=${APP_AUTOMATION_WORLD_MAX_PER_CUISINE:60}
app.automation.world.include-open-food-facts=${APP_AUTOMATION_WORLD_INCLUDE_OPEN_FOOD_FACTS:true}
app.automation.world.pages=${APP_AUTOMATION_WORLD_PAGES:2}
app.automation.world.page-size=${APP_AUTOMATION_WORLD_PAGE_SIZE:180}
app.automation.sweets.pages=${APP_AUTOMATION_SWEETS_PAGES:2}
app.automation.sweets.page-size=${APP_AUTOMATION_SWEETS_PAGE_SIZE:160}
app.automation.sweets.max-per-query=${APP_AUTOMATION_SWEETS_MAX_PER_QUERY:16}
app.automation.sweets.max-mealdb-desserts=${APP_AUTOMATION_SWEETS_MAX_MEALDB_DESSERTS:220}
app.automation.images.ingredient-limit=${APP_AUTOMATION_IMAGES_INGREDIENT_LIMIT:420}
app.automation.images.dish-limit=${APP_AUTOMATION_IMAGES_DISH_LIMIT:420}

server.port=8080
server.address=${SERVER_ADDRESS:0.0.0.0}
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:240}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript,text/javascript

app.media.root=${APP_MEDIA_ROOT:media}
app.media.api-prefix=${APP_MEDIA_API_PREFIX:/api/media}
app.media.max-image-bytes=${APP_MEDIA_MAX_IMAGE_BYTES:5242880}

app.ai.vision.provider=${APP_AI_VISION_PROVIDER:hybrid-local}
app.ai.vision.max-image-bytes=${APP_AI_VISION_MAX_IMAGE_BYTES:6291456}
app.ai.vision.max-candidates=${APP_AI_VISION_MAX_CANDIDATES:10}
app.ai.vision.remote-endpoint=${APP_AI_VISION_REMOTE_ENDPOINT:}
app.ai.vision.remote-key=${APP_AI_VISION_REMOTE_KEY:}
app.ai.vision.remote-timeout-ms=${APP_AI_VISION_REMOTE_TIMEOUT_MS:8000}
app.ai.vision.openai.base-url=${APP_AI_VISION_OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
app.ai.vision.openai.model=${APP_AI_VISION_OPENAI_MODEL:gpt-4o-mini}
app.ai.vision.openai.key=${APP_AI_VISION_OPENAI_KEY:${OPENAI_API_KEY:}}
app.ai.vision.openai.max-labels=${APP_AI_VISION_OPENAI_MAX_LABELS:8}
